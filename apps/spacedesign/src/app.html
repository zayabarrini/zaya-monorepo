<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.png"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css"
      integrity="sha384-vZTGFMhNs91QlTjf3Fz3jbNvmtKw8eO1poFskfdmVxr3kENTKWgynxJpVp8LOKfj"
      crossorigin="anonymous"
    /> -->
    <meta name="viewport" content="width=device-width" />
    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="hover"
    class="bg-white text-black dark:bg-dark-background dark:text-white"
  >
    <div class="background-blobs"></div>
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((registration) => {
              console.log(
                "Service Worker registrado com sucesso:",
                registration
              );
            })
            .catch((error) => {
              console.log(
                "Falha ao registrar o Service Worker:",
                error
              );
            });
        });
      }
    </script>
  </body>
</html>
